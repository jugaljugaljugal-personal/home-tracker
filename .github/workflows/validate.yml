name: Validate

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate L_DATA syntax
        run: |
          node -e "
            const html = require('fs').readFileSync('index.html', 'utf8');
            const match = html.match(/const L_DATA = \[[\s\S]*?\];/);
            if (!match) { console.error('L_DATA not found'); process.exit(1); }
            eval(match[0]);
            console.log('L_DATA OK —', L_DATA.length, 'properties');
          "

      - name: Check property count
        run: |
          node -e "
            const html = require('fs').readFileSync('index.html', 'utf8');
            const match = html.match(/const L_DATA = \[[\s\S]*?\];/);
            eval(match[0]);
            const missing = L_DATA.filter(l => !l.addr || !l.lat || !l.lon || !l.price);
            if (missing.length > 0) {
              console.error('Properties missing required fields:', missing.map(l => l.n).join(', '));
              process.exit(1);
            }
            console.log('All', L_DATA.length, 'properties have required fields');
          "
